                    - heading "Root Cause" [level=2] [ref=e214]
                    - paragraph [ref=e215]:
                      - text: Claude thinking models generate
                      - code [ref=e216]: thinking
                      - text: blocks in every assistant response. On the
                      - strong [ref=e217]: next
                      - text: "turn, MC's Phase 1 transform pipeline runs:"
                    - list [ref=e218]:
                      - listitem [ref=e219]:
                        - code [ref=e220]: reasoning replay
                        - text: → clears N thinking blocks (N grows each turn)
                      - listitem [ref=e221]:
                        - code [ref=e222]: stripClearedReasoning
                        - text: → strips the cleared parts
                      - listitem [ref=e223]:
                        - code [ref=e224]: sentinel replay
                        - text: → neutralizes stripped messages
                    - paragraph [ref=e225]:
                      - text: Because N changes every turn (new thinking blocks from the latest response), the conversation body is
                      - strong [ref=e226]: different from the previous turn's body
                      - text: . Google's implicit prefix cache is keyed on exact prefix hash — any change in the conversation messages results in a complete cache miss.
                    - heading "Evidence from MC Logs" [level=2] [ref=e227]
                    - paragraph [ref=e228]:
                      - text: Three consecutive transforms on the
                      - strong [ref=e229]: same account
                      - text: ", no account switch, <2 minutes apart:"
